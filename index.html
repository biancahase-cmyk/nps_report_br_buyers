function fmt(v, decimals=1) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  return v.toFixed(decimals);
}
function fmtPP(v, decimals=1, showSign=true) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  const s = showSign && v > 0 ? '+' : '';
  return s + v.toFixed(decimals) + ' pp';
}
function colorClass(v, threshold=0) {
  if (v === null || v === undefined || isNaN(v)) return '';
  return v < threshold ? 'val-neg' : (v > threshold ? 'val-pos' : '');
}
function colorSign(v) { return v < 0 ? '#F23D4F' : (v > 0 ? '#00A650' : '#999999'); }

function buildSection(title, content) {

// =====================================================================
// CALCULATIONS
// =====================================================================
function calcEtapa2(team) {
  const total = team.enc_a;
  let sumImpact = 0;
  const rows = team.etapa2.map(p => {
    const rep = p.enc_a / total;
    const impact = (p.nps_a - p.nps_b) * rep;
    sumImpact += impact;
    return {...p, rep, impact};
  });
  const outros = team.nps_a - team.nps_b - sumImpact;
  return {rows, outros};
}


function calcEtapa6(team) {
  const ts = team.etapa6.team_surveys;
  return team.etapa6.rows.map(r => {
    const q4sim = r.q1 - 35;
    const ganho = Math.max(0, (q4sim - r.q4)) * r.ag * 2.5 / ts;
    return {...r, q4sim, ganho};
  });
}

// =====================================================================
// BUILD CROSS
// =====================================================================
function buildCross() {
  const all = [teams.pre, teams.post, teams.compra];
  const tot_a = all.reduce((s,t)=>s+t.enc_a,0);
  const tot_b = all.reduce((s,t)=>s+t.enc_b,0);
  const nps_a = Math.round(all.reduce((s,t)=>s+t.nps_a*t.enc_a,0)/tot_a*10)/10;
  const nps_b = Math.round(all.reduce((s,t)=>s+t.nps_b*t.enc_b,0)/tot_b*10)/10;
  const target = Math.round(all.reduce((s,t)=>s+t.target*t.enc_a,0)/tot_a*10)/10;
  const gap = Math.round((nps_a-target)*10)/10;
  const target_b = Math.round(all.reduce((s,t)=>s+t.target*t.enc_b,0)/tot_b*10)/10;
  const gap_b = Math.round((nps_b-target_b)*10)/10;

  // Etapa2: aggregate by process name
  const pmap2 = {};
  all.forEach(t => {
    const ratio = t.enc_b > 0 ? t.enc_b / t.enc_a : 1;
    t.etapa2.forEach(p => {
      if (!pmap2[p.proc]) pmap2[p.proc] = {proc:p.proc, wa:0, wb:0, ea:0, eb:0};
      const eb = p.enc_a * ratio;
      pmap2[p.proc].ea += p.enc_a;
      pmap2[p.proc].wa += p.nps_a * p.enc_a;
      pmap2[p.proc].eb += eb;
      pmap2[p.proc].wb += p.nps_b * eb;
    });
  });
  const etapa2 = Object.values(pmap2)
    .map(p => ({proc:p.proc, nps_a:Math.round(p.wa/p.ea*10)/10, nps_b:Math.round(p.wb/p.eb*10)/10, enc_a:Math.round(p.ea)}))
    .sort((a,b) => b.enc_a - a.enc_a).slice(0,7);

  // Etapa3: aggregate by process name
  const pmap3 = {};
  all.forEach(t => {
    t.etapa3.forEach(p => {
      if (!pmap3[p.proc]) pmap3[p.proc] = {proc:p.proc, wn:0, wt:0, enc:0};
      pmap3[p.proc].enc += p.enc;
      pmap3[p.proc].wn += p.nps * p.enc;
      pmap3[p.proc].wt += p.tgt * p.enc;
    });
  });
  const etapa3 = Object.values(pmap3)
    .map(p => ({proc:p.proc, nps:Math.round(p.wn/p.enc*10)/10, tgt:Math.round(p.wt/p.enc*10)/10, enc:Math.round(p.enc)}))
    .sort((a,b) => (a.nps-a.tgt)/a.enc - (b.nps-b.tgt)/b.enc).slice(0,5);

  // Etapa4: agregar etapa4_procs de todos os times por nome de processo
  const procMap = {};
  all.forEach(t => {
    const procs = (t.etapa4_procs && t.etapa4_procs.length > 0) ? t.etapa4_procs : [t.etapa4];
    procs.forEach(pd => {
      if (!pd.proc) return;
      if (!procMap[pd.proc]) {
        procMap[pd.proc] = {proc: pd.proc, total_det: 0, enc: 0, proc_nps: null, proc_tgt: null,
          _wNps: 0, _wTgt: 0, _wEnc: 0, cdus: {}, sols: {}};
      }
      const pm = procMap[pd.proc];
      pm.total_det += pd.total_det || 0;
      pm.enc += pd.enc || 0;
      if (pd.proc_nps !== null && pd.enc > 0) {
        pm._wNps += pd.proc_nps * pd.enc;
        pm._wTgt += pd.proc_tgt * pd.enc;
        pm._wEnc += pd.enc;
      }
      (pd.cdus || []).forEach(c => {
        if (c.cdu === 'Outros') return;
        pm.cdus[c.cdu] = (pm.cdus[c.cdu] || 0) + c.det;
      });
      (pd.sols || []).forEach(s => {
        if (s.sol === 'Outros') return;
        pm.sols[s.sol] = (pm.sols[s.sol] || 0) + s.cnt;
      });
    });
  });

  const etapa4_procs = Object.values(procMap)
    .sort((a, b) => b.total_det - a.total_det)
    .slice(0, 5)
    .map(pm => {
      const pnps = pm._wEnc > 0 ? Math.round(pm._wNps / pm._wEnc * 10) / 10 : null;
      const ptgt = pm._wEnc > 0 ? Math.round(pm._wTgt / pm._wEnc * 10) / 10 : null;
      const topCdus = Object.entries(pm.cdus).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([cdu,det])=>({cdu,det}));
      const outrosDet = pm.total_det - topCdus.reduce((s,c)=>s+c.det,0);
      topCdus.push({cdu:'Outros', det: Math.max(0, outrosDet)});
      const topSols = Object.entries(pm.sols).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([sol,cnt])=>({sol,cnt}));
      const outrosCnt = pm.enc - topSols.reduce((s,x)=>s+x.cnt,0);
      topSols.push({sol:'Outros', cnt: Math.max(0, outrosCnt)});
      return {proc: pm.proc, total_det: pm.total_det, enc: pm.enc,
              proc_nps: pnps, proc_tgt: ptgt, cdus: topCdus, sols: topSols};
    });

  const totalDet = etapa4_procs.reduce((s,p)=>s+p.total_det,0);

  // Etapa5: all offices labeled
  const labels5 = ['Pre','Post','Compra'];
  const etapa5 = [];
  all.forEach((t,i) => {
    t.etapa5.forEach(r => etapa5.push({...r, o:`${r.o} (${labels5[i]})`}));
  });

  // Etapa6: all offices labeled
  const etapa6rows = [];
  all.forEach((t,i) => {
    t.etapa6.rows.forEach(r => etapa6rows.push({...r, o:`${r.o} (${labels5[i]})`}));
  });

  return {
    name: 'BR_Buyers \u2014 Cross',
    nps_a, enc_a: tot_a, target, gap,
    nps_b, enc_b: tot_b, gap_b,
    etapa2, etapa3,
    etapa4: etapa4_procs[0] || {proc:'—', proc_nps:null, proc_tgt:null, total_det:0, cdus:[], sols:[]},
    etapa4_procs,
    etapa5,
    etapa6: {team_surveys:tot_a, rows:etapa6rows},
  };
}

// =====================================================================
function renderMacro(team) {
  const delta = team.nps_a - team.nps_b;
  const deltaGap = team.gap - team.gap_b;
  const target_b = team.target_b !== undefined ? team.target_b : (team.nps_b - team.gap_b);
  const html = `
    <table>
      <thead><tr><th>M\u00e9trica</th><th>${DATES.week_a}/${DATES.year}</th><th>${DATES.week_b}/${DATES.year}</th><th>Delta WoW</th></tr></thead>
      <tbody>
        <tr><td><strong>NPS</strong></td><td>${fmt(team.nps_a)}%</td><td>${fmt(team.nps_b)}%</td><td class="${colorClass(delta)}"><strong>${fmtPP(delta, 1, true)}</strong></td></tr>
        <tr><td>Target</td><td>${fmt(team.target)}%</td><td>${fmt(target_b)}%</td><td>\u2014</td></tr>
        <tr><td>GAP vs Target</td><td class="${colorClass(team.gap)}">${fmtPP(team.gap,1,true)}</td><td class="${colorClass(team.gap_b)}">${fmtPP(team.gap_b,1,true)}</td><td class="${colorClass(deltaGap)}">${fmtPP(deltaGap,1,true)}</td></tr>
        <tr><td><strong>Encuestas</strong></td><td><strong>${team.enc_a.toLocaleString('pt-BR')}</strong></td><td><strong>${team.enc_b.toLocaleString('pt-BR')}</strong></td><td>\u2014</td></tr>
      </tbody>
    </table>`;
  return buildSection('Etapa 1 \u2014 Resultado Macro', html);
}

function renderEtapa2(team, tabId) {
  const {rows, outros} = calcEtapa2(team);
  const sumImpact = rows.reduce((s,r)=>s+r.impact,0);
  const totalImpact = sumImpact + outros;

  const sortedRows = [...rows].sort((a,b) => b.impact - a.impact);

  let trows = sortedRows.map(r => `
    <tr>
      <td>${r.proc}</td>
      <td>${fmt(r.nps_a)}%</td>
      <td>${fmt(r.nps_b)}%</td>
      <td>${(r.rep*100).toFixed(1)}%</td>
      <td class="${colorClass(r.impact)}">${r.impact>=0?'+':''}${fmt(r.impact,2)} pp</td>
    </tr>`).join('');

  const outrCls = colorClass(outros);
  trows += `<tr class="row-italic"><td>Outros processos</td><td>\u2014</td><td>\u2014</td><td>\u2014</td><td class="${outrCls}">${outros>=0?'+':''}${fmt(outros,2)} pp</td></tr>`;
  trows += `<tr class="row-total"><td>Total</td><td>${fmt(team.nps_a)}%</td><td>${fmt(team.nps_b)}%</td><td>100%</td><td class="${colorClass(totalImpact)}">${totalImpact>=0?'+':''}${fmt(totalImpact,2)} pp</td></tr>`;

  const wowTotal = team.nps_a - team.nps_b;
  const worstP = sortedRows.filter(r => r.impact < 0).at(-1);
  const bestP  = sortedRows.filter(r => r.impact > 0)[0];
  const worstCtx = worstP
    ? `<strong>"${worstP.proc}"</strong> puxou negativamente ${fmtPP(worstP.impact,2,true)} \u2014 este processo teve NPS de ${fmt(worstP.nps_a)}% vs ${fmt(worstP.nps_b)}% na semana anterior e representa ${(worstP.rep*100).toFixed(0)}% do volume, indicando piora na experi\u00eancia dos clientes nessa jornada`
    : 'sem processo com impacto negativo significativo';
  const bestCtx = bestP
    ? `<strong>"${bestP.proc}"</strong> contribuiu positivamente ${fmtPP(bestP.impact,2,true)} (NPS ${fmt(bestP.nps_a)}% vs ${fmt(bestP.nps_b)}% ant., ${(bestP.rep*100).toFixed(0)}% do volume)`
    : 'sem processo com impacto positivo significativo';
  const lecturaText = `Varia\u00e7\u00e3o WoW total de <strong>${fmtPP(wowTotal,1,true)}</strong>. ${worstCtx}. ${bestP ? 'Em contrapartida, ' + bestCtx + '.' : ''} O residual "Outros processos" acumula ${fmtPP(outros,2,true)} (processos com volume < 15 encuestas).`;

  const chartId = `chart_e2_${tabId}`;
  const html = `
    <table>
      <thead><tr><th>Processo</th><th>NPS Atual</th><th>NPS Ant.</th><th>Repres.</th><th>Impacto</th></tr></thead>
      <tbody>${trows}</tbody>
    </table>
    <div class="chart-box">
      <div class="chart-title">Waterfall \u2014 Decomposi\u00e7\u00e3o WoW (NPS ant. \u2192 NPS atual)</div>
      <canvas id="${chartId}" style="height:280px"></canvas>
    </div>
    <div class="lectura-box">&#128161; <strong>Leitura:</strong> ${lecturaText}</div>`;

  pendingCharts.push({id: chartId, type: 'waterfall_wow', team, rows: sortedRows, outros});

  return buildSection('Etapa 2 \u2014 Impacto WoW por Processo', html);
}


const _e4Data = {};
const _e4Teams = {};

function _buildE4BodyHtml(sectionId, pd) {
  if (!pd) return '<p>Sem dados</p>';
  const team = _e4Teams[sectionId];
  const gapPP = pd.proc_nps !== null ? pd.proc_nps - pd.proc_tgt : null;
  const repProc = team ? team.etapa2.find(p => p.proc === pd.proc) : null;
  const impactApprox = (repProc && gapPP !== null)
    ? fmtPP(gapPP * (repProc.enc_a / team.enc_a), 2, true) : '\u2014';
  const procLabel = pd.proc_nps !== null
    ? `<strong>${pd.proc}</strong> \u2014 NPS <strong>${fmt(pd.proc_nps)}%</strong> | Target <strong>${fmt(pd.proc_tgt)}%</strong> | GAP <strong class="${colorClass(gapPP)}">${fmtPP(gapPP,1,true)}</strong> | Impacto no time <strong>${impactApprox}</strong>`
    : `<strong>${pd.proc}</strong>`;

  let cduRows = (pd.cdus || []).map(c => {
    const pct = pd.total_det > 0 ? (c.det / pd.total_det * 100).toFixed(1) : '\u2014';
    const impCdu = pd.enc > 0 ? fmtPP(-(c.det / pd.enc) * 100, 2, true) : '\u2014';
    return `<tr><td>${c.cdu}</td><td class="text-right">${c.det}</td><td class="text-right">${pct}%</td><td class="text-right val-neg">${impCdu}</td></tr>`;
  }).join('');
  cduRows += `<tr class="row-total"><td>Total detratores</td><td class="text-right">${pd.total_det}</td><td class="text-right">100%</td><td class="text-right">\u2014</td></tr>`;

  const totalSols = (pd.sols || []).reduce((s,x) => s + x.cnt, 0);
  let solRows = (pd.sols || []).map(s => {
    const pct = totalSols > 0 ? (s.cnt / totalSols * 100).toFixed(1) : '\u2014';
    return `<tr><td>${s.sol}</td><td class="text-right">${s.cnt}</td><td class="text-right">${pct}%</td></tr>`;
  }).join('');
  const hasSols = pd.sols && pd.sols.filter(s => s.sol !== 'Outros').length > 0;
  const solTable = hasSols ? `
    <div class="sol-section-title">📋 Abertura por Solução</div>
    <table>
      <thead><tr><th>Solução</th><th class="text-right">Contatos</th><th class="text-right">%</th></tr></thead>
      <tbody>${solRows}</tbody>
    </table>` : '';

  return `<div class="etapa4-sub">${procLabel}</div>
    <table>
      <thead><tr><th>CDU</th><th class="text-right">Detratores</th><th class="text-right">% det.</th><th class="text-right">Impacto NPS</th></tr></thead>
      <tbody>${cduRows}</tbody>
    </table>${solTable}`;
}

function _renderE4Body(sectionId, idx) {
  const pd = _e4Data[sectionId] && _e4Data[sectionId][idx];
  if (!pd) return;
  document.getElementById('body_' + sectionId).innerHTML = _buildE4BodyHtml(sectionId, pd);
}

}

function renderEtapa5(team, tabId) {
  let trows = team.etapa5.map(r => {
    const gapE = r.en !== null ? r.en - r.et : null;
    const gapN = r.nn !== null ? r.nn - r.nt : null;
    const hasData = (gapE !== null || gapN !== null);
    let alerta;
    if (!hasData) {
      alerta = '<span>\u2014</span>';
    } else {
      const critical = (gapE !== null && gapE < -3) || (gapN !== null && gapN < -3);
      alerta = critical ? '<span class="alerta-bad">&#128308;</span>' : '<span class="alerta-ok">&#128994;</span>';
    }
    return `<tr>
      <td><strong>${r.o}</strong></td>
      <td>${r.en!==null?fmt(r.en)+'%':'\u2014'}</td>
      <td>${r.nn!==null?fmt(r.nn)+'%':'\u2014'}</td>
      <td class="${gapE!==null?colorClass(gapE):''}">${gapE!==null?fmtPP(gapE,1,true):'\u2014'}</td>
      <td class="${gapN!==null?colorClass(gapN):''}">${gapN!==null?fmtPP(gapN,1,true):'\u2014'}</td>
      <td class="text-center">${alerta}</td>
    </tr>`;
  }).join('');

  const valid = team.etapa5.filter(r=>r.en!==null&&r.nn!==null);
  let criticalOffice = null, refOffice = null;
  if (valid.length > 0) {
    criticalOffice = valid.reduce((a,b)=>(Math.min(b.en-b.et,b.nn-b.nt) < Math.min(a.en-a.et,a.nn-a.nt)?b:a));
    refOffice = valid.reduce((a,b)=>(Math.min(b.en-b.et,b.nn-b.nt) > Math.min(a.en-a.et,a.nn-a.nt)?b:a));
  }
  const lecturaText = criticalOffice && refOffice
    ? `O office cr\u00edtico \u00e9 <strong>${criticalOffice.o}</strong> (EXPERT ${fmt(criticalOffice.en)}% / NEWBIE ${criticalOffice.nn!==null?fmt(criticalOffice.nn)+'%':'\u2014'}). O office de refer\u00eancia \u00e9 <strong>${refOffice.o}</strong>, com melhor performance relativa ao target.`
    : 'Analise os dados por office para identificar oportunidades de melhoria.';

  const chartId = `chart_e5_${tabId}`;
  const html = `
    <table>
      <thead><tr><th>Office</th><th>EXPERT NPS</th><th>NEWBIE NPS</th><th>GAP Expert</th><th>GAP Newbie</th><th class="text-center">Alerta</th></tr></thead>
      <tbody>${trows}</tbody>
    </table>
    <div class="chart-box">
      <div class="chart-title">NPS por Office \u00d7 Antiguidade \u2014 semana ${DATES.week_a}/${DATES.year}</div>
      <canvas id="${chartId}" style="height:280px"></canvas>
    </div>
    <div class="lectura-box">&#128161; <strong>Leitura:</strong> ${lecturaText}</div>`;

  pendingCharts.push({id: chartId, type: 'office_bar', team});

  return buildSection('Etapa 4 \u2014 Office \u00d7 Antiguidade', html);
}

function renderHallazgos(team) {
  const insights = [];
  const acoes = [];

  // 1. WoW delta
  const wow = team.nps_a - team.nps_b;
  const wowSign = wow >= 0 ? '+' : '';
  const wowCls = wow >= 0 ? 'ins-pos' : 'ins-neg';
  insights.push({cls: wowCls, icon: wow >= 0 ? '📈' : '📉',
    text: `NPS <strong>${wowSign}${wow.toFixed(1)} pp WoW</strong>: ${team.nps_b.toFixed(1)}% → ${team.nps_a.toFixed(1)}% (${team.enc_a.toLocaleString('pt-BR')} encuestas)`});

  // 2. GAP vs target
  const gapCls = team.gap >= 0 ? 'ins-pos' : 'ins-neg';
  insights.push({cls: gapCls, icon: team.gap >= 0 ? '✅' : '⚠️',
    text: `GAP vs target: <strong>${team.gap >= 0 ? '+' : ''}${team.gap.toFixed(1)} pp</strong> \u2014 NPS ${team.nps_a.toFixed(1)}% vs meta ${team.target.toFixed(1)}%. Semana anterior estava ${team.gap_b >= 0 ? '+' : ''}${team.gap_b.toFixed(1)} pp vs meta`});

  // 3. Pior processo WoW
  if (team.etapa2.length > 0) {
    const worstWoW = [...team.etapa2].sort((a,b) => (a.nps_a - a.nps_b) - (b.nps_a - b.nps_b))[0];
    const delta = worstWoW.nps_a - worstWoW.nps_b;
    if (delta < -1) {
      const rep = (worstWoW.enc_a / team.enc_a * 100).toFixed(0);
      insights.push({cls: 'ins-neg', icon: '🔻',
        text: `Maior queda WoW: <strong>"${worstWoW.proc}"</strong> caiu ${Math.abs(delta).toFixed(1)} pp \u2014 NPS foi de ${fmt(worstWoW.nps_b)}% para ${fmt(worstWoW.nps_a)}% (${rep}% do volume do time)`});
      acoes.push({icon: '🔍', text: `Investigar queda em <strong>"${worstWoW.proc}"</strong>: levantar se houve mudan\u00e7a de fila, aumento de TMA, problema sist\u00eamico ou baixa performance de TLs espec\u00edficos na semana ${DATES.week_a}`});
    }
    const bestWoW = [...team.etapa2].sort((a,b) => (b.nps_a - b.nps_b) - (a.nps_a - a.nps_b))[0];
    const deltaB = bestWoW.nps_a - bestWoW.nps_b;
    if (deltaB > 2) {
      const repB = (bestWoW.enc_a / team.enc_a * 100).toFixed(0);
      insights.push({cls: 'ins-pos', icon: '📊',
        text: `Destaque positivo WoW: <strong>"${bestWoW.proc}"</strong> subiu ${deltaB.toFixed(1)} pp (${repB}% do volume)`});
    }
  }

  // 4. Pior processo vs target (etapa3)
  if (team.etapa3.length > 0) {
    const worstGap = [...team.etapa3].sort((a,b) => (a.nps - a.tgt) - (b.nps - b.tgt))[0];
    const gap3 = worstGap.nps - worstGap.tgt;
    const rep3 = (worstGap.enc / team.enc_a * 100).toFixed(0);
    insights.push({cls: gap3 < 0 ? 'ins-neg' : 'ins-neutral', icon: '🎯',
      text: `Maior GAP vs target: <strong>"${worstGap.proc}"</strong> com ${gap3.toFixed(1)} pp (NPS ${worstGap.nps.toFixed(1)}% vs meta ${worstGap.tgt.toFixed(1)}%, ${rep3}% do volume)`});
    acoes.push({icon: '🎯', text: `Elaborar plano de a\u00e7\u00e3o para <strong>"${worstGap.proc}"</strong>: NPS ${worstGap.nps.toFixed(1)}% vs meta ${worstGap.tgt.toFixed(1)}% \u2014 revisar CDUs, monitorar chamadas e alinhar com TL sobre pontos de melhoria`});
  }

  // 5. CDU principal
  if (team.etapa4 && team.etapa4.cdus.length > 0) {
    const topCdu = team.etapa4.cdus.find(c => c.cdu !== 'Outros');
    if (topCdu) {
      const pct = team.etapa4.total_det > 0 ? (topCdu.det / team.etapa4.total_det * 100).toFixed(0) : '—';
      insights.push({cls: 'ins-alert', icon: '🔴',
        text: `CDU principal em <strong>"${team.etapa4.proc}"</strong>: <strong>"${topCdu.cdu}"</strong> (${pct}% dos ${team.etapa4.total_det} detratores)`});
      acoes.push({icon: '💬', text: `Criar material de coaching para <strong>"${topCdu.cdu}"</strong> no processo "${team.etapa4.proc}": ${pct}% dos detratores concentrados nessa causa \u2014 revisar script de atendimento e calibrar com TLs`});
    }
  }

  // 6. Office crítico (etapa5)
  const validOffices = team.etapa5.filter(r => r.en !== null || r.nn !== null);
  if (validOffices.length > 0) {
    const scored = validOffices.map(r => {
      const gE = r.en !== null ? r.en - r.et : 999;
      const gN = r.nn !== null ? r.nn - r.nt : 999;
      return {...r, minGap: Math.min(gE === 999 ? gN : gE, gN === 999 ? gE : gN)};
    });
    const critOff = scored.sort((a,b) => a.minGap - b.minGap)[0];
    const critGaps = [];
    if (critOff.en !== null) critGaps.push(`EXPERT ${critOff.en.toFixed(1)}% (meta ${critOff.et.toFixed(1)}%)`);
    if (critOff.nn !== null) critGaps.push(`NEWBIE ${critOff.nn.toFixed(1)}% (meta ${critOff.nt.toFixed(1)}%)`);
    if (critOff.minGap < -2) {
      insights.push({cls: 'ins-neg', icon: '🏢',
        text: `Office crítico: <strong>${critOff.o}</strong> — ${critGaps.join(' | ')}`});
      acoes.push({icon: '🏢', text: `Reuni\u00e3o de alinhamento com TL do office <strong>${critOff.o}</strong>: analisar distribui\u00e7\u00e3o de performance, identificar agentes abaixo da meta e criar plano individualizado de desenvolvimento`});
    }
  }

  // 7. Dispersão Q1-Q4
  if (team.etapa6.rows.length > 0) {
    const rows6 = calcEtapa6(team);
    const totalGanho = rows6.reduce((s,r) => s + r.ganho, 0);
    if (totalGanho > 0.05) {
      insights.push({cls: 'ins-opportunity', icon: '💡',
        text: `Potencial de nivelamento: <strong>+${totalGanho.toFixed(2)} pp</strong> se dispersão Q1-Q4 reduzida a 35pp por office`});
      const best = [...rows6].sort((a,b) => b.ganho - a.ganho)[0];
      acoes.push({icon: '📋', text: `Programa de nivelamento Q4 priorit\u00e1rio em <strong>${best.o}</strong> (+${best.ganho.toFixed(2)} pp potencial): fazer calibra\u00e7\u00f5es individuais com agentes Q4, compartilhar boas pr\u00e1ticas dos agentes Q1 e monitorar evolu\u00e7\u00e3o semanal`});
    }
  }

  const insHtml = insights.map(i =>
    `<div class="insight-item ${i.cls}"><span class="ins-icon">${i.icon}</span><span>${i.text}</span></div>`
  ).join('');

  const acoesHtml = acoes.length > 0
    ? acoes.map(a =>
        `<div class="acao-item"><span class="acao-icon">${a.icon}</span><span>${a.text}</span></div>`
      ).join('')
    : '<div class="acao-item"><span class="acao-icon">✅</span><span>Sem ações críticas identificadas para esta semana</span></div>';

  return `
    <div class="insights-box">
      <div class="insights-header">📌 Diagnóstico da Semana</div>
      <div class="insights-list">${insHtml}</div>
    </div>
    <div class="acoes-box">
      <div class="acoes-header">✅ Ações Recomendadas</div>
      <div class="acoes-list">${acoesHtml}</div>
    </div>`;
}

function renderWaterfallWow(cfg) {
  const {id, team, rows, outros} = cfg;
  const canvas = document.getElementById(id);
  if (!canvas) return;

  // PASSO 1: calcular barras flutuantes (sem ancoras)
  const floatData = [];
  const floatColors = [];
  const floatLabels = [];
  let running = team.nps_b;
  rows.forEach(r => {
    const low = r.impact >= 0 ? running : running + r.impact;
    const high = r.impact >= 0 ? running + r.impact : running;
    floatData.push([low, high]);
    floatColors.push(r.impact >= 0 ? '#00A650' : '#F23D4F');
    floatLabels.push(r.proc.length > 17 ? r.proc.substring(0,15)+'\u2026' : r.proc);
    running += r.impact;
  });
  // Outros
  const oLow = outros >= 0 ? running : running + outros;
  const oHigh = outros >= 0 ? running + outros : running;
  floatData.push([oLow, oHigh]);
  floatColors.push(outros >= 0 ? '#00A650' : '#F23D4F');
  floatLabels.push('Outros');
  running += outros;

  // PASSO 2: determinar yMin e yMax a partir dos valores reais
  const allFloatVals = [...floatData.flat(), team.nps_b, team.nps_a];
  const minVal = Math.min(...allFloatVals);
  const maxVal = Math.max(...allFloatVals);
  const pad = Math.max((maxVal - minVal) * 0.25, 1.5);
  const yMin = minVal - pad;
  const yMax = maxVal + pad;

  // PASSO 3: barras ancora vao de yMin ate o valor (nao de 0)
  const allData = [[yMin, team.nps_b], ...floatData, [yMin, team.nps_a]];
  const allColors = ['#3483FA', ...floatColors, '#3483FA'];
  const allLabels = [
    `${team.nps_b.toFixed(1)}% ant.`,
    ...floatLabels,
    `${team.nps_a.toFixed(1)}% atual`
  ];

  new Chart(canvas, {
    type: 'bar',
    data: {
      labels: allLabels,
      datasets: [{
        data: allData,
        backgroundColor: allColors,
        borderRadius: 2,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {display: false},
        tooltip: {callbacks: {label: ctx => {
          const v = ctx.raw;
          if (!Array.isArray(v)) return '';
          const i = ctx.dataIndex;
          if (i === 0 || i === allData.length-1) return `NPS: ${v[1].toFixed(1)}%`;
          const isNeg = allColors[i] === '#F23D4F';
          const mag = Math.abs(v[1]-v[0]);
          return `Impacto: ${isNeg?'-':'+'}${mag.toFixed(2)} pp`;
        }}},
        datalabels: {
          display: true,
          formatter: (val, ctx) => {
            if (!Array.isArray(val)) return '';
            const i = ctx.dataIndex;
            if (i === 0 || i === allData.length - 1) return val[1].toFixed(1) + '%';
            const isNeg = allColors[i] === '#F23D4F';
            const mag = Math.abs(val[1] - val[0]);
            return (isNeg ? '-' : '+') + mag.toFixed(2) + ' pp';
          },
          color: '#fff',
          font: { size: 10, weight: 'bold' },
          anchor: 'center',
          align: 'center',
          clamp: true,
        }
      },
      scales: {
        y: {
          min: yMin, max: yMax,
          grid: {color: '#f0f0f0'},
          ticks: {callback: v => v.toFixed(1)+'%', font: {size: 11}}
        },
        x: {
          grid: {display: false},
          ticks: {font: {size: 10}, maxRotation: 35}
        }
      }
    }
  });
}


function renderOfficeBar(cfg) {
  const {id, team} = cfg;
  const canvas = document.getElementById(id);
  if (!canvas) return;

  const e5 = team.etapa5;
  const labels = e5.map(r=>r.o);
  const expertNPS = e5.map(r=>r.en);
  const newbieNPS = e5.map(r=>r.nn);
  const expertTgt = e5.map(r=>r.et);
  const newbieTgt = e5.map(r=>r.nt);

  new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'EXPERT NPS',
          data: expertNPS,
          backgroundColor: 'rgba(26,115,232,0.85)',
          borderRadius: 3,
        },
        {
          label: 'NEWBIE NPS',
          data: newbieNPS,
          backgroundColor: 'rgba(255,152,0,0.85)',
          borderRadius: 3,
        },
        {
          type: 'line',
          label: 'EXPERT Target',
          data: expertTgt,
          borderColor: 'rgba(26,115,232,0.9)',
          backgroundColor: 'rgba(26,115,232,0.0)',
          borderWidth: 2,
          borderDash: [5,3],
          pointRadius: 4,
          pointBackgroundColor: 'rgba(26,115,232,0.9)',
          tension: 0,
          order: 0,
        },
        {
          type: 'line',
          label: 'NEWBIE Target',
          data: newbieTgt,
          borderColor: 'rgba(255,152,0,0.9)',
          backgroundColor: 'rgba(255,152,0,0.0)',
          borderWidth: 2,
          borderDash: [5,3],
          pointRadius: 4,
          pointBackgroundColor: 'rgba(255,152,0,0.9)',
          tension: 0,
          order: 0,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 } } },
        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw !== null ? ctx.raw.toFixed(1) + '%' : '\u2014'}` } }
      },
      scales: {
        y: {
          suggestedMin: (() => {
            const vals = [...expertNPS, ...newbieNPS, ...expertTgt, ...newbieTgt].filter(v => v !== null);
            return vals.length > 0 ? Math.max(0, Math.min(...vals) - 10) : 0;
          })(),
          suggestedMax: (() => {
            const vals = [...expertNPS, ...newbieNPS, ...expertTgt, ...newbieTgt].filter(v => v !== null);
            return vals.length > 0 ? Math.min(100, Math.max(...vals) + 10) : 100;
          })(),
          grid: { color: '#f0f0f0' },
          ticks: { callback: v => v + '%', font: { size: 11 } }
        },
        x: {
          grid: { display: false },
          ticks: { font: { size: 11 } }
        }
      }
    }
  });
}

function renderDispBar(cfg) {
  const {id, rows6} = cfg;
  const canvas = document.getElementById(id);
  if (!canvas) return;

  // Gráfico horizontal: cada office tem Q1 (verde) e Q4 (vermelho)
  // + linha de Q4 simulado (meta 35pp gap)
  const labels = rows6.map(r => `${r.o} (${r.ag} ag.)`);
  const q1  = rows6.map(r => r.q1);
  const q4  = rows6.map(r => r.q4);
  const q4meta = rows6.map(r => Math.max(r.q4, r.q1 - 35)); // meta: Q1-35

  const allVals = [...q1, ...q4].filter(v => v != null);
  const yMin = allVals.length ? Math.max(0, Math.min(...allVals) - 8) : 0;
  const yMax = allVals.length ? Math.min(100, Math.max(...allVals) + 8) : 100;

  new Chart(canvas, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Q1 NPS (top 25%)',
          data: q1,
          backgroundColor: 'rgba(27,94,32,0.80)',
          borderColor: 'rgba(27,94,32,1)',
          borderWidth: 1,
          borderRadius: 4,
          barPercentage: 0.6,
        },
        {
          label: 'Q4 NPS (bottom 25%)',
          data: q4,
          backgroundColor: 'rgba(211,47,47,0.80)',
          borderColor: 'rgba(211,47,47,1)',
          borderWidth: 1,
          borderRadius: 4,
          barPercentage: 0.6,
        },
        {
          type: 'line',
          label: 'Meta Q4 (Q1 − 35pp)',
          data: q4meta,
          borderColor: 'rgba(255,152,0,0.95)',
          backgroundColor: 'rgba(255,152,0,0.0)',
          borderWidth: 2,
          borderDash: [6, 3],
          pointRadius: 5,
          pointBackgroundColor: 'rgba(255,152,0,0.95)',
          tension: 0,
          order: 0,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 14 } },
        datalabels: {
          display: true,
          formatter: (val, ctx) => val != null ? val.toFixed(1) + '%' : '',
          color: ctx => ctx.dataset.type === 'line' ? '#e65100' : '#fff',
          font: { size: 10, weight: 'bold' },
          anchor: ctx => ctx.dataset.type === 'line' ? 'end' : 'center',
          align:  ctx => ctx.dataset.type === 'line' ? 'top'   : 'center',
        }
      },
      scales: {
        y: {
          min: yMin, max: yMax,
          grid: { color: '#f0f0f0' },
          ticks: { callback: v => v + '%', font: { size: 11 } }
        },
        x: {
          grid: { display: false },
          ticks: { font: { size: 11 } }
        }
      }
    }
  });
}

function renderPendingCharts() {
  pendingCharts.forEach(cfg => {
    if (cfg.type === 'waterfall_wow') renderWaterfallWow(cfg);
    else if (cfg.type === 'office_bar') renderOfficeBar(cfg);
    else if (cfg.type === 'disp_bar') renderDispBar(cfg);
  });
}

// =====================================================================
// SWITCH TAB (4 abas)
// =====================================================================
function switchTab(tabId) {
  const ids = ['cross','pre','post','compra'];
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ids[i] === tabId);
  });
  document.querySelectorAll('.tab-content').forEach(tc => {
    tc.classList.toggle('active', tc.id === `tab-${tabId}`);
  });
}

// =====================================================================
// INIT
// =====================================================================
window.addEventListener('DOMContentLoaded', () => {
  renderTab(buildCross(), 'cross');
  renderTab(teams.pre, 'pre');
  renderTab(teams.post, 'post');
  renderTab(teams.compra, 'compra');
  renderPendingCharts();
});
</script>
